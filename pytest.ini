[pytest]
# Tells pytest to add your root, core, and api folders to the Python path automatically
pythonpath = . core api

# Registers the location of your test files
testpaths = tests

# Configures clean terminal test readouts
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Prevents pytest from choking on async code warning logs
filterwarnings =
    ignore::DeprecationWarning